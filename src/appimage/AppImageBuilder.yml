# all paths are relative to location of this file 
# python3.12 -m venv appimage_venv
# source appimage_venv/bin/activate
# pip instal appimage-builder
# pip install packaging==20.9
# appimage-builder --recipe AppImageBuilder.yml

version: 1

script:
  - rm -rf AppDir || true
  - mkdir -p AppDir/usr/src
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp resources/photoglimmer.png  AppDir/usr/share/icons/hicolor/256x256/apps/photoglimmer.png

  - |
      ./venv/bin/python3.12 -m pip install \
        --no-cache-dir \
        --upgrade \
        --force-reinstall \
        --prefix=/usr \
        --root=AppDir \
        -r ../requirements.txt
  # copy source      
  - cp -r ../photoglimmer AppDir/usr/src/
  


AppDir:
  path: ./AppDir

  app_info:
    id: io.github.codecliff.photoglimmer
    name: PhotoGlimmer
    icon: photoglimmer
    version: 0.9.6
    # exec: usr/bin/photoglimmer
    exec: usr/bin/python3.12
    exec_args: -m photoglimmer

  apt:
    arch: amd64
    sources:
      - sourceline: deb [trusted=yes] http://archive.ubuntu.com/ubuntu jammy main universe
      - sourceline: deb [trusted=yes] http://archive.ubuntu.com/ubuntu jammy-updates main universe
      - sourceline: deb [trusted=yes] http://ppa.launchpad.net/deadsnakes/ppa/ubuntu jammy main

    include:
      # Python runtime ONLY (no python3-* modules!)
      - python3.12

      # Qt + GUI runtime libs
      - libgl1
      - libegl1
      - libglib2.0-0
      - libdbus-1-3
      - libfontconfig1
      - libfreetype6
      - libxrender1
      - libgtk-3-0
      - libxkbcommon-x11-0
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-xinerama0
      - libxcb-xinput0
      - libxcb-shape0
      - libxcb-xfixes0
      - fonts-dejavu
      - fonts-noto-color-emoji

    exclude:
      - libasound2
      - libgstreamer1.0-0
      - gstreamer1.0-plugins-base

  files:
    include:
      - resources/photoglimmer.png
      - resources/photoglimmer

  runtime:
    env:
      PYTHONPATH: '${APPDIR}/usr/lib/python3.12/site-packages:${APPDIR}/usr/src'
      QT_QPA_PLATFORM: 'xcb'
      LANG: 'C.UTF-8'
      LC_ALL: 'C.UTF-8'
      GALLIUM_DRIVER: 'llvmpipe'
      MPLCONFIGDIR: '${HOME}/.config/matplotlib'

AppImage:
  arch: x86_64
  file_name: PhotoGlimmer-latest-x86_64.AppImage
  update-information: none
