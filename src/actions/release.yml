name: Build and Release PhotoGlimmer

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

jobs:
  # 1. VERSION EXTRACTION
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        run: |
          # Use the robust sed logic to pull version from Interfaces.py
          V=$(sed -n 's/^APP_VERSION.*=.*["'\'']\([^"'\'']*\)["'\''].*/\1/p' src/photoglimmer/backend/Interfaces.py)
          echo "version=$V" >> $GITHUB_OUTPUT

  # 2. SNAP BUILD
  build-snap:
    needs: get-version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Snap
        uses: snapcore/action-build@v1
        with:
          path: src/ # Runs from src/ 
          snapcraft-args: pack --destructive-mode
      - uses: actions/upload-artifact@v4
        with:
          name: photoglimmer-snap
          path: src/*.snap

  # 3. APPIMAGE BUILD
  build-appimage:
    needs: get-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev
      - name: Build AppImage
        working-directory: src/appimage
        run: |
          # Inject version into environment for the recipe
          export APP_VERSION=${{ needs.get-version.outputs.version }}
          python -m venv appimage_venv
          source appimage_venv/bin/activate
          pip install appimage-builder packaging==20.9
          appimage-builder --recipe AppImageBuilder.yml
      - uses: actions/upload-artifact@v4
        with:
          name: photoglimmer-appimage
          path: src/appimage/*.AppImage

  # 4. UNIFIED RELEASE
  create-release:
    needs: [get-version, build-snap, build-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Mandatory for creating releases
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true # Flattens Snap and AppImage into one folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Uses the version  extracted in Job 1 as the Tag
          tag_name: v${{ needs.get-version.outputs.version }}
          name: PhotoGlimmer v${{ needs.get-version.outputs.version }} (${{ github.event.inputs.release_type }})
          body: |
            Automated build for PhotoGlimmer version ${{ needs.get-version.outputs.version }}.
            Type: ${{ github.event.inputs.release_type }}
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          files: |
            ./release-artifacts/*.snap
            ./release-artifacts/*.AppImage
          generate_release_notes: true
          
