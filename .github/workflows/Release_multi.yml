name: snap_appimage_096

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version Number- tag only (e.g., 0.9.6)'
        required: true
        default: '0.9.6'
      release_type:
        description: 'Type of release'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

jobs:
  # 1. SNAP BUILD
  build-snap:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Build Snap (Destructive Mode)
        working-directory: src
        run: |
          # We use destructive-mode to avoid LXD/Multipass overhead
          # We point specifically to the snapcraft.yaml inside the snap/ folder
          sudo snapcraft pack --destructive-mode --snapcraft-file snap/snapcraft.yaml

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoglimmer-snap
          path: src/*.snap

  # 2. APPIMAGE BUILD
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev

      - name: Build AppImage
        working-directory: src/appimage
        run: |
          # Inject version into environment for the recipe
          export APP_VERSION=${{ github.event.inputs.release_version }}
          python -m venv venv
          source venv/bin/activate
          pip install packaging==20.9 
          pip install appimage-builder 
          appimage-builder --recipe AppImageBuilder.yml

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoglimmer-appimage
          path: src/appimage/*.AppImage

  # 3. UNIFIED RELEASE
  create-release:
    needs: [build-snap, build-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          name: PhotoGlimmer v${{ github.event.inputs.release_version }} (${{ github.event.inputs.release_type }})
          body: |
            Automated build for PhotoGlimmer version ${{ github.event.inputs.release_version }}.
            Type: ${{ github.event.inputs.release_type }}
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          files: |
            ./release-artifacts/*.snap
            ./release-artifacts/*.AppImage
          generate_release_notes: true
